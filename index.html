<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบติดตามสถานะยา</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
    .container { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
    h2 { color: #27ae60; text-align: center; margin-bottom: 25px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
    input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .btn { width: 100%; padding: 15px; background: #27ae60; color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn:disabled { background: #bdc3c7; }
    #loader { display: none; text-align: center; color: #7f8c8d; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>ตรวจสอบสถานะยา</h2>
    <label>เลขประจำตัวผู้ป่วย (HN)</label>
    <input type="text" id="hn" placeholder="ระบุเลข HN">
    <label>เบอร์โทรศัพท์ (4 ตัวท้าย)</label>
    <input type="number" id="phone" placeholder="ระบุ 4 ตัวท้าย">
    <button class="btn" id="submitBtn" onclick="submitForm()">ตรวจสอบข้อมูล</button>
    <div id="loader">กำลังประมวลผล...</div>
  </div>

  <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwlazrxOlJUq7pnfMk3ytwpWazuK1GqbnYcPPNFZ34T4w9CuK4URoI_WL3mpr9_cBYIrg/exec";

    async function initLiff() {
      await liff.init({ liffId: "2009135390-GqovlBEp" });
      if (!liff.isLoggedIn()) { liff.login(); }
    }
    initLiff();

    async function submitForm() {
      const hn = document.getElementById('hn').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const btn = document.getElementById('submitBtn');
      const loader = document.getElementById('loader');

      if (!hn || !phone) { alert("กรุณากรอกข้อมูลให้ครบครับ"); return; }

      btn.disabled = true;
      loader.style.display = "block";

      try {
        const profile = await liff.getProfile();
        const userId = profile.userId;

        await fetch(webAppUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "liff_push",
            userId: userId,
            hn: hn,
            phone: phone
          })
        });

        liff.closeWindow();
      } catch (err) {
        alert("เกิดข้อผิดพลาด: " + err);
        btn.disabled = false;
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
